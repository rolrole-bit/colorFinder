# ── DYE MASTER Nginx 리버스 프록시 + HTTPS 설정 ──
#
# 사용법:
#   1. 도메인명을 YOUR_DOMAIN.COM 에서 실제 도메인으로 변경
#   2. /etc/nginx/sites-available/dye-master 에 복사
#   3. sudo ln -s /etc/nginx/sites-available/dye-master /etc/nginx/sites-enabled/
#   4. sudo certbot --nginx -d YOUR_DOMAIN.COM   (HTTPS 인증서 발급)
#   5. sudo nginx -t && sudo systemctl reload nginx

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN.COM;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS + 리버스 프록시
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN.COM;

    # ── SSL (Certbot이 자동 생성) ──
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN.COM/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── 보안 헤더 (Helmet.js가 처리하므로 최소한만) ──
    add_header X-Content-Type-Options nosniff always;

    # ── 리버스 프록시 → Node.js (포트 8080) ──
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # 타임아웃
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── 정적 파일 직접 서빙 (성능 최적화) ──
    location ~* \.(js|css|woff2|woff|ttf|png|jpg|ico)$ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── 접근 차단 ──
    location ~ /\. {
        deny all;
    }
}
